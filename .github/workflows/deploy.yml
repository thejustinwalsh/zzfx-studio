name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/zzfx-studio
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build packages
        run: pnpm -r run build
        working-directory: .

      - name: Export web build
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_BASE_URL: /zzfx-studio

      - name: Write version.json
        run: node -e "fs=require('fs');p=require('./package.json');fs.writeFileSync('dist/version.json',JSON.stringify({version:p.version}))"

      - name: Generate service worker
        run: npx workbox-cli injectManifest workbox-config.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/zzfx-studio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
